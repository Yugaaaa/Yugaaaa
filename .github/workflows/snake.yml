name: Generate Snake Animation

# ============================================================
#  WHAT THIS DOES
#  --------------
#  This workflow uses the "snk" action (by Platane) to read your
#  public GitHub contribution graph and turn it into an animated
#  SVG where a snake "eats" your contribution squares.
#  It then commits that SVG to a separate branch called "output",
#  which is what the README's <img> tag points to.
# ============================================================

on:
  # Runs automatically once a day at 00:00 UTC (05:30 AM IST)
  schedule:
    - cron: "0 0 * * *"

  # Also runs immediately whenever you push changes to this workflow
  # or manually trigger it from the Actions tab — useful for testing
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate-snake:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate the snake SVG(s)
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          # Custom colors set explicitly to match the Tokyo Night palette
          # used throughout the README (rather than relying on an assumed
          # built-in preset name, which I want to be precise about):
          #   color_snake -> bb9af7 (Tokyo Night purple)
          #   color_dots  -> 5 shades from empty (dark navy) to most active (blue)
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=bb9af7&color_dots=1a1b26,24283b,414868,565f89,7aa2f7
            dist/github-contribution-grid-snake.svg

      - name: Push the generated SVG to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
